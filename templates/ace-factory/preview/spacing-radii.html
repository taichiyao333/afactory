<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex;gap:20px;align-items:center">
  <div style="width:80px;height:80px;border:1px solid #2A2A2A;border-radius:0"></div>
  <div style="width:80px;height:80px;border:1px solid #2A2A2A;border-radius:2px"></div>
  <div style="width:80px;height:80px;border:1px solid #2A2A2A;border-radius:4px"></div>
  <div style="flex:1">
    <div class="meta">Radii · 0 · 2 · 4</div>
    <div style="color:#A0A0A0;font-size:12px;margin-top:6px;line-height:1.6">Near-square only.<br>Buttons / inputs: 2px.<br>Cards max: 4px.<br>Nothing is pill-shaped.</div>
  </div>
</div>
<div style="margin-top:22px;padding-top:18px;border-top:1px solid #2A2A2A">
  <div class="meta">No shadows · no gradients · no glows</div>
  <div style="color:#A0A0A0;font-size:12px;margin-top:6px;line-height:1.6">Elevation comes from surface colour alone (#1A1A1A on #000).</div>
</div>
</body></html>
